<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38ef7d" />
      <stop offset="50%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>
    <filter id="sc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background squircle -->
  <rect width="64" height="64" rx="16" fill="#090d16" />
  <rect width="62" height="62" x="1" y="1" rx="15" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />
  <!-- Stylized Tech S Monogram -->
  <path d="M42 20 C42 15, 36 14, 30 14 C20 14, 18 20, 22 25 L34 29 C42 32, 44 42, 34 48 C26 52, 18 48, 18 42" 
        fill="none" 
        stroke="url(#sc-grad)" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#sc-glow)" />
  <circle cx="42" cy="20" r="3.5" fill="#38ef7d" />
  <circle cx="18" cy="42" r="3.5" fill="#7928ca" />
</svg>
